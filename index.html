.twRoot{font-size:15px;}

sup{font-size:8px;}

@media(min-width:1001px){
  /* PC最適化：ヘッダー縦積み＋セレクタ横並び、ワークスペース2カラム（左=操作／右=ゲージ・パス図 小・固定） */
  .twHead{flex-direction:column !important; align-items:stretch !important; gap:14px !important;}
  .segsWrap{flex-direction:row !important; flex-wrap:wrap !important; width:100% !important; min-width:0 !important; gap:16px !important;}
  .segsWrap > div{flex:1 1 210px; min-width:0;}
  .workspace{display:grid !important; grid-template-columns:minmax(0,1fr) minmax(0,1fr) !important; column-gap:20px !important; row-gap:14px !important; align-items:start;}
  .workspace > *:nth-child(1){grid-column:2; grid-row:1;}      /* ゲージ＋パス図（固定） */
  .workspace > *:nth-child(2){grid-column:1; grid-row:1 / span 30;} /* 操作（スライダー）：左を広く */
  .workspace > *:nth-child(n+3){grid-column:2;}                /* 比較・分解パネルは右に縦積み */
  .stickyResult{max-height:none !important; overflow:visible !important;}
  .stickyResult .chainBig{padding:8px;}
  .stickyResult .chainBig svg{max-height:32vh;}
  .dpSticky{display:block; margin-top:8px;}
  .dpFlow{display:none;}
}
@media(max-width:1000px){
  .workspace{display:flex !important; flex-direction:column !important; gap:14px !important;}
  .stickyResult{margin:0 -12px !important; padding:8px 12px 10px !important; border-radius:0 !important; border-left:none !important; border-right:none !important; max-height:62vh;}
  .liveGauges{margin:0; border-radius:11px;}
  .liveGauges .rct{display:none;}
  .gaugeStack{gap:8px !important;}
  .liveGauges .gpts{font-size:13px !important; margin-top:2px !important;}
}
@media(max-width:820px){
  .lvGrid{grid-template-columns:1fr !important;}
}
@media(max-width:768px){
  .twRoot{padding:0 12px 18px !important;}

  .pdxCards{grid-template-columns:1fr !important;}
  .sumWrap{overflow-x:auto; -webkit-overflow-scrolling:touch;}
  .sumWrap>div{min-width:680px;}
}
